<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrossel de Clientes — Ascend Consultancy</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .marquee-wrapper {
    width: 100%;
    overflow: hidden;
    background: transparent;
    padding: 16px 0;
    position: relative;
    display: inline-block;
  }

  /* Fade nas bordas esquerda e direita */
  .marquee-wrapper::before,
  .marquee-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .marquee-wrapper::before {
    left: 0;
    background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
  }
  .marquee-wrapper::after {
    right: 0;
    background: linear-gradient(to left, rgba(255,255,255,0.9), transparent);
  }

  .marquee-track {
    display: flex;
    align-items: center;
    width: max-content;
    animation: marquee 18s linear infinite;
  }

  .marquee-track:hover {
    animation-play-state: paused;
  }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .marquee-item {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 48px;
    flex-shrink: 0;
  }

  /* ─── MODO IMAGEM ─────────────────────────────────────────────
     Para usar imagens reais, substitua o conteúdo
     de cada .marquee-item por:
       <img src="SUA_URL_AQUI" alt="Nome" class="logo-img" />
  ──────────────────────────────────────────────────────────────── */
  .logo-img {
    height: 48px;
    width: auto;
    filter: grayscale(100%);
    opacity: 0.55;
    transition: filter 0.3s ease, opacity 0.3s ease;
  }
  .logo-img:hover {
    filter: grayscale(0%);
    opacity: 1;
  }

  /* ─── MODO TEXTO ─────────────────────────────────────────────── */
  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    opacity: 0.6;
    white-space: nowrap;
    transition: color 0.3s ease, opacity 0.3s ease;
    user-select: none;
  }
  .logo-text:hover {
    color: #1A3A5C;
    opacity: 1;
  }

  /* Separador entre itens */
  .marquee-sep {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
  }

  /* ─── RESPONSIVO ──────────────────────────────────────────────── */
  @media (min-width: 768px) {
    .logo-img  { height: 72px; }
    .logo-text { font-size: 18px; }
    .marquee-item { padding: 0 56px; }
  }

  @media (min-width: 1280px) {
    .logo-img  { height: 96px; }
    .logo-text { font-size: 20px; }
    .marquee-item { padding: 0 72px; }
  }
</style>
</head>
<body>

<div class="marquee-wrapper">
  <div class="marquee-track">

    <!-- SEQUÊNCIA 1 -->
    <div class="marquee-item"><span class="logo-text">Dotz</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Dafiti</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">FDE</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Carbon</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Vertco</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">High Glass</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Simpar</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Benefício Certo</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Cappta</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Climatempo</span></div>
    <div class="marquee-sep"></div>

    <!-- SEQUÊNCIA 2 — cópia para loop contínuo sem corte -->
    <div class="marquee-item"><span class="logo-text">Dotz</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Dafiti</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">FDE</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Carbon</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Vertco</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">High Glass</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Simpar</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Benefício Certo</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Cappta</span></div>
    <div class="marquee-sep"></div>
    <div class="marquee-item"><span class="logo-text">Climatempo</span></div>
    <div class="marquee-sep"></div>

  </div>
</div>

<script>
  function reportHeight() {
    const height = document.querySelector('.marquee-wrapper').offsetHeight;
    window.parent.postMessage({ type: 'iwanttoknowtheheight', height: height }, '*');
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
</script>

</body>
</html>
