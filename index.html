<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrossel de Clientes — Ascend Consultancy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .marquee-wrapper {
    width: 100%;
    overflow: hidden;
    background: transparent;
    padding: 12px 0;
    position: relative;
    display: inline-block;
  }

  .marquee-wrapper::before,
  .marquee-wrapper::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .marquee-wrapper::before {
    left: 0;
    background: linear-gradient(to right, rgba(255,255,255,0.95), transparent);
  }
  .marquee-wrapper::after {
    right: 0;
    background: linear-gradient(to left, rgba(255,255,255,0.95), transparent);
  }

  .marquee-track {
    display: flex;
    align-items: center;
    width: max-content;
    animation: marquee 18s linear infinite;
  }
  .marquee-track:hover { animation-play-state: paused; }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .marquee-item {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    flex-shrink: 0;
  }

  .logo-img {
    height: 28px;        /* Mobile: reduzido */
    width: auto;
    max-width: 100px;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: grayscale(100%);
    opacity: 0.6;
    transition: filter 0.3s ease, opacity 0.3s ease;
  }

  .logo-img.logo-dark {
    mix-blend-mode: screen;
  }

  .logo-img:hover {
    filter: grayscale(0%);
    opacity: 1;
  }

  .logo-fallback {
    display: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    opacity: 0.6;
    white-space: nowrap;
  }

  .marquee-sep {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
  }

  /* Tablet: 1.5x */
  @media (min-width: 768px) {
    .logo-img  { height: 36px; max-width: 130px; }
    .marquee-item { padding: 0 40px; }
  }

  /* Desktop: 2x */
  @media (min-width: 1280px) {
    .logo-img  { height: 44px; max-width: 160px; }
    .marquee-item { padding: 0 52px; }
  }
</style>
</head>
<body>

<div class="marquee-wrapper">
  <div class="marquee-track" id="track"></div>
</div>

<script>
  const BASE = 'https://rafaelpinesi-ascend.github.io/ascend-carrossel/logos/';

  const empresas = [
    { src: BASE + 'dotz (1).png',                    alt: 'Dotz',            dark: false },
    { src: BASE + 'Dafiti.png',                      alt: 'Dafiti',          dark: false },
    { src: BASE + 'logo_FDE.png',                    alt: 'FDE',             dark: false },
    { src: BASE + 'Logo Carbon.webp',                alt: 'Carbon',          dark: true  },
    { src: BASE + 'logo_vertco_2.png',               alt: 'Vertco',          dark: false },
    { src: BASE + 'high_glass_2.png',                alt: 'High Glass',      dark: false },
    { src: BASE + 'Logo_Simpar.jpg',                 alt: 'Simpar',          dark: false },
    { src: BASE + 'beneficio_certo.png',             alt: 'Benefício Certo', dark: false },
    { src: BASE + 'cappta (1).png',                  alt: 'Cappta',          dark: true  },
    { src: BASE + 'climatempo.jpg',                  alt: 'Climatempo',      dark: false },
  ];

  function criarItem(e) {
    const darkClass = e.dark ? 'logo-dark' : '';
    return `
      <div class="marquee-item">
        <img
          class="logo-img ${darkClass}"
          src="${e.src}"
          alt="${e.alt}"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
        />
        <span class="logo-fallback">${e.alt}</span>
      </div>
      <div class="marquee-sep"></div>`;
  }

  const track = document.getElementById('track');
  track.innerHTML = empresas.map(criarItem).join('') + empresas.map(criarItem).join('');

  function reportHeight() {
    const h = document.querySelector('.marquee-wrapper').offsetHeight;
    window.parent.postMessage({ type: 'iwanttoknowtheheight', height: h }, '*');
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
</script>

</body>
</html>
